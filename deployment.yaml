apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-fashionhouse-backend
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kb-fashionhouse-backend
  template:
    metadata:
      labels:
        app: kb-fashionhouse-backend
    spec:
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: kb-fashionhouse-backend
          image: khadar3099/kb-fashion-house:v.4
          imagePullPolicy: Always
          ports:
            - containerPort: 8181
