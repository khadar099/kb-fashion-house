<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - KB Fashion House</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        background: linear-gradient(to right, #8e2de2, #4a00e0);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-box {
        width: 320px;
        padding: 30px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        color: white;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 12px 0;
        border: none;
        border-bottom: 1px solid white;
        background: transparent;
        color: white;
        font-size: 14px;
    }

    input::placeholder {
        color: #ddd;
    }

    .btn {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: white;
        color: black;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn:hover {
        background: #ddd;
    }

    .link {
        font-size: 12px;
        color: #eee;
        text-decoration: none;
    }

    .forgot {
        text-align: right;
        display: block;
        margin-top: -5px;
    }

    .msg-error {
        color: #ff6b6b;
        font-size: 13px;
    }

    .msg-success {
        color: #90ee90;
        font-size: 13px;
    }
</style>
```

</head>
<body>

<div class="login-box">

```
<h2>Login</h2>

<!-- ERROR MESSAGE -->
<p class="msg-error" th:if="${param.error}">
    Invalid username or password
</p>

<!-- LOGOUT MESSAGE -->
<p class="msg-success" th:if="${param.logout}">
    You have been logged out successfully
</p>

<form method="post" action="/login">

    <!-- Username -->
    <input type="text" name="username" placeholder="Username" required />

    <!-- Password -->
    <input type="password" name="password" placeholder="Password" required />

    <!-- Forgot Password -->
    <a href="#" class="link forgot">Forgot Password?</a>

    <!-- Login Button -->
    <button type="submit" class="btn">Log in</button>

</form>

<br>

<!-- Register -->
<p style="font-size: 13px;">
    Don’t have an account?
    <a href="/register" class="link">Register!!</a>
</p>
```

</div>

</body>
</html>
