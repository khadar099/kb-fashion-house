<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Register - KB Fashion House</h2>

<form method="post" action="/register">

    <!-- EMAIL -->
    <input type="email"
           name="email"
           placeholder="Email"
           required />
    <br><br>

    <!-- MOBILE -->
    <input type="text"
           name="mobile"
           placeholder="Mobile Number"
           required />
    <br><br>

    <!-- PASSWORD -->
    <input type="password"
           name="password"
           placeholder="Password"
           required />
    <br><br>

    <button type="submit">Register</button>

</form>

</body>
</html>
