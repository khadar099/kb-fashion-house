<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>

    <!-- Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Our Products 👗</h1>

    <div class="row">

        <div class="col-md-4 mb-4" th:each="p : ${products}">
            <div class="card h-100 shadow-sm">

                <!-- Product Image -->
                <img th:src="${p.imageUrl}" class="card-img-top" alt="Product Image" style="height:250px; object-fit:cover;">

                <div class="card-body text-center">
                    <h5 class="card-title" th:text="${p.name}"></h5>

                    <p class="text-success fw-bold">
                        ₹ <span th:text="${p.price}"></span>
                    </p>

                    <!-- Click to view details -->
                    <a th:href="@{'/product/' + ${p.id}}" class="btn btn-primary">
                        View Details
                    </a>
                </div>

            </div>
        </div>

    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-secondary">Back Home</a>
    </div>

</div>

</body>
</html>
